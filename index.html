<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>STL 每日運動影片紀錄</title>
    <style>
      :root,
      html[data-theme="light"] {
        color-scheme: light;
        --bg: #f6f7fb;
        --surface: #ffffff;
        --surface-muted: #f0f2f7;
        --text: #202433;
        --muted: #666d7e;
        --line: #dfe3ec;
        --primary: #6254ff;
        --primary-strong: #4435db;
        --accent-soft: #f1efff;
        --input-bg: #ffffff;
        --chip-bg: #ffffff;
        --today-bg: #ffffff;
        --today-text: #202433;
        --today-muted: #6f688c;
        --today-icon-bg: #f1efff;
        --row-bg: #ffffff;
        --row-hover: #f9f9ff;
        --empty-bg: #fbfcff;
        --focus-ring: #4d3dff;
        --shadow: 0 16px 36px rgba(37, 43, 61, 0.09);
        --chip-shadow: 0 8px 18px rgba(37, 43, 61, 0.06);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --bg: #090910;
          --surface: #11111a;
          --surface-muted: #1d1b29;
          --text: #f5f3ff;
          --muted: #a7a1ba;
          --line: #29263a;
          --primary: #8b7cff;
          --primary-strong: #c8c1ff;
          --accent-soft: #211b3c;
          --input-bg: #15141e;
          --chip-bg: #171522;
          --today-bg: #20193d;
          --today-text: #fbfaff;
          --today-muted: #c2bce9;
          --today-icon-bg: rgba(139, 124, 255, 0.18);
          --row-bg: #15131e;
          --row-hover: #1c1929;
          --empty-bg: #12111a;
          --focus-ring: #d9d2ff;
          --shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
          --chip-shadow: none;
        }
      }

      html[data-theme="dark"] {
        color-scheme: dark;
        --bg: #090910;
        --surface: #11111a;
        --surface-muted: #1d1b29;
        --text: #f5f3ff;
        --muted: #a7a1ba;
        --line: #29263a;
        --primary: #8b7cff;
        --primary-strong: #c8c1ff;
        --accent-soft: #211b3c;
        --input-bg: #15141e;
        --chip-bg: #171522;
        --today-bg: #20193d;
        --today-text: #fbfaff;
        --today-muted: #c2bce9;
        --today-icon-bg: rgba(139, 124, 255, 0.18);
        --row-bg: #15131e;
        --row-hover: #1c1929;
        --empty-bg: #12111a;
        --focus-ring: #d9d2ff;
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
        --chip-shadow: none;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        line-height: 1.5;
      }

      input,
      button {
        font: inherit;
      }

      a {
        color: inherit;
      }

      a:focus-visible,
      button:focus-visible,
      input:focus-visible {
        outline: 2px solid var(--focus-ring);
        outline-offset: 3px;
        box-shadow: 0 0 0 4px color-mix(in srgb, var(--focus-ring) 22%, transparent);
      }

      .app-shell {
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 22px;
      }

      .title-block h1 {
        margin: 0;
        font-size: 2rem;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .title-block p {
        margin: 8px 0 0;
        color: var(--muted);
      }

      .header-actions {
        display: flex;
        align-items: flex-start;
        justify-content: flex-end;
        gap: 10px;
      }

      .stats {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
        min-width: 0;
      }

      .stat {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--chip-bg);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 7px 11px;
        box-shadow: var(--chip-shadow);
      }

      .stat strong {
        display: inline;
        font-size: 0.95rem;
        line-height: 1.1;
      }

      .stat span {
        display: inline;
        color: var(--muted);
        font-size: 0.78rem;
        white-space: nowrap;
      }

      .theme-toggle {
        min-height: 36px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--chip-bg);
        color: var(--text);
        padding: 0 13px;
        box-shadow: var(--chip-shadow);
        cursor: pointer;
        white-space: nowrap;
      }

      .theme-toggle:hover {
        border-color: var(--primary);
        color: var(--primary-strong);
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        padding: 18px;
      }

      .today-section {
        margin-bottom: 18px;
      }

      .section-heading {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .count-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 24px;
        min-height: 22px;
        border-radius: 999px;
        background: var(--surface-muted);
        color: var(--muted);
        padding: 0 8px;
        font-size: 0.76rem;
        line-height: 1;
      }

      .today-card {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        align-items: stretch;
        border: 1px solid var(--line);
        border-left: 5px solid var(--primary);
        border-radius: 8px;
        background: var(--today-bg);
        color: var(--today-text);
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .today-card--fallback {
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 14px;
        align-items: center;
        padding: 16px 18px;
      }

      .today-media {
        width: 100%;
        min-width: 0;
        aspect-ratio: 16 / 9;
        border-bottom: 1px solid var(--line);
        background: #000000;
      }

      .today-video {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #000000;
      }

      .today-copy {
        padding: 16px 18px 18px;
      }

      .equalizer-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: 8px;
        background: var(--today-icon-bg);
        color: var(--primary);
        font-size: 0.78rem;
        letter-spacing: 1px;
        line-height: 1;
      }

      .today-title {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.35;
        letter-spacing: 0;
      }

      .today-title a {
        color: inherit;
        text-decoration: none;
      }

      .today-title a:hover {
        color: var(--primary-strong);
      }

      .today-description {
        margin: 6px 0 0;
        color: var(--today-muted);
        white-space: pre-wrap;
      }

      .today-date {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        margin-top: 10px;
        border-radius: 999px;
        background: var(--surface-muted);
        color: var(--today-muted);
        padding: 0 10px;
        font-size: 0.92rem;
        white-space: nowrap;
      }

      .today-card--fallback .today-date {
        display: block;
        margin-top: 0;
        background: transparent;
        padding: 0;
      }

      .history-panel {
        margin-top: 0;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .toolbar h2 {
        margin: 0;
        font-size: 1.05rem;
        letter-spacing: 0;
      }

      .search-wrap {
        flex: 1;
        max-width: 420px;
        min-width: 210px;
      }

      .search-wrap input {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--input-bg);
        color: var(--text);
        padding: 0 16px;
        outline: 0;
        transition: border-color 140ms ease, box-shadow 140ms ease, background 140ms ease;
      }

      .search-wrap input:focus {
        background: var(--input-bg);
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--focus-ring);
      }

      .record-list {
        display: grid;
        gap: 12px;
      }

      .record {
        display: grid;
        grid-template-columns: 112px minmax(0, 1fr) auto;
        gap: 12px;
        align-items: start;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: var(--row-bg);
        transition: background 140ms ease, border-color 140ms ease;
      }

      .record:hover {
        background: var(--row-hover);
        border-color: color-mix(in srgb, var(--primary) 32%, var(--line));
      }

      .record-media {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 112px;
        aspect-ratio: 16 / 9;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-muted);
        color: var(--muted);
        overflow: hidden;
        text-decoration: none;
      }

      .record-media:hover {
        border-color: var(--primary);
      }

      .record-media-placeholder {
        padding: 8px;
        text-align: center;
        font-size: 0.78rem;
        line-height: 1.25;
      }

      .record-thumbnail {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .record-main {
        min-width: 0;
      }

      .record-date {
        display: inline-flex;
        align-items: center;
        justify-self: end;
        min-height: 28px;
        border-radius: 999px;
        background: var(--surface-muted);
        color: var(--primary-strong);
        padding: 0 9px;
        font-size: 0.86rem;
        font-weight: 750;
      }

      .record-title {
        margin: 0 0 5px;
        font-size: 1.08rem;
        line-height: 1.35;
        letter-spacing: 0;
      }

      .record-title a {
        text-decoration-color: color-mix(in srgb, var(--primary) 40%, transparent);
        text-underline-offset: 3px;
      }

      .record-title a:hover {
        color: var(--primary);
      }

      .record-author {
        margin: 0 0 5px;
        color: var(--primary-strong);
        font-size: 0.86rem;
        font-weight: 700;
      }

      .record-description {
        margin: 0;
        color: var(--muted);
        white-space: pre-wrap;
      }

      .today-title,
      .today-description,
      .record-title,
      .record-description {
        overflow-wrap: anywhere;
      }

      .empty-state {
        border: 1px dashed var(--line);
        border-radius: 8px;
        background: var(--empty-bg);
        color: var(--muted);
        padding: 26px 18px;
        text-align: center;
      }

      @media (max-width: 720px) {
        .topbar,
        .toolbar {
          flex-direction: column;
          align-items: stretch;
        }

        .header-actions {
          flex-direction: column;
          align-items: stretch;
        }

        .stats {
          width: 100%;
          min-width: 0;
          justify-content: flex-start;
        }

        .search-wrap {
          max-width: none;
        }

        .today-card--fallback {
          grid-template-columns: auto minmax(0, 1fr);
        }

        .today-card--fallback .today-date {
          grid-column: 2;
          justify-self: start;
        }

        .record {
          grid-template-columns: 96px minmax(0, 1fr);
        }

        .record-media {
          width: 96px;
        }

        .record-date {
          grid-column: 2;
          justify-self: start;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="title-block">
          <h1>STL 每日運動影片紀錄</h1>
          <p>記錄每天的運動影片網址與 description。</p>
        </div>
        <div class="header-actions">
          <div class="stats" aria-label="紀錄統計">
            <div class="stat">
              <strong id="total-count">0</strong>
              <span>總紀錄</span>
            </div>
            <div class="stat">
              <strong id="latest-date">-</strong>
              <span>最新日期</span>
            </div>
          </div>
          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="深色模式" aria-pressed="false">深色模式：關</button>
        </div>
      </header>

      <section class="today-section" aria-labelledby="today-heading">
        <h2 class="section-heading" id="today-heading">今日運動</h2>
        <div id="today-entry"></div>
      </section>

      <section class="panel history-panel" aria-labelledby="history-heading">
        <div class="toolbar">
          <h2 id="history-heading">歷史影片
            <span class="count-badge" id="history-count">0</span>
          </h2>
          <div class="search-wrap">
            <input id="search-input" type="search" aria-label="搜尋歷史影片" placeholder="搜尋歷史影片的日期、標題或 description">
          </div>
        </div>
        <div class="record-list" id="history-list"></div>
      </section>
    </main>

    <script src="data.js"></script>
    <script>
      const entries = Array.isArray(window.dailySportEntries) ? window.dailySportEntries : [];
      const oEmbedMetadataCache = new Map();
      const oEmbedPendingUrls = new Set();

      const elements = {
        today: document.querySelector("#today-entry"),
        historyList: document.querySelector("#history-list"),
        historyCount: document.querySelector("#history-count"),
        search: document.querySelector("#search-input"),
        totalCount: document.querySelector("#total-count"),
        latestDate: document.querySelector("#latest-date"),
        themeToggle: document.querySelector("#theme-toggle")
      };

      function getSystemTheme() {
        return window.matchMedia?.("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      function getCurrentTheme() {
        return document.documentElement.dataset.theme || getSystemTheme();
      }

      function getNextTheme() {
        return getCurrentTheme() === "dark" ? "light" : "dark";
      }

      function updateThemeToggle() {
        const currentTheme = getCurrentTheme();
        const isDark = currentTheme === "dark";

        elements.themeToggle.textContent = `深色模式：${isDark ? "開" : "關"}`;
        elements.themeToggle.setAttribute("aria-label", "深色模式");
        elements.themeToggle.setAttribute("aria-pressed", isDark ? "true" : "false");
      }

      function toggleTheme() {
        document.documentElement.dataset.theme = getNextTheme();
        updateThemeToggle();
      }

      function getEntryValue(entry, key) {
        return entry?.[key] == null ? "" : String(entry[key]);
      }

      function sortEntries(items) {
        return [...items].sort((a, b) => {
          const dateCompare = getEntryValue(b, "date").localeCompare(getEntryValue(a, "date"));
          if (dateCompare !== 0) return dateCompare;
          return getEntryValue(a, "title").localeCompare(getEntryValue(b, "title"), "zh-Hant");
        });
      }

      function getTodayString(now = new Date()) {
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const day = String(now.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function findTodayEntryIndex(items, today = getTodayString()) {
        let latestIndex = -1;

        items.forEach((entry, index) => {
          if (getEntryValue(entry, "date") === today) {
            latestIndex = index;
          }
        });

        return latestIndex;
      }

      function getSearchText(entry) {
        return [
          getEntryValue(entry, "date"),
          getEntryValue(entry, "title"),
          getEntryValue(entry, "url"),
          getEntryValue(entry, "description")
        ].join(" ").toLowerCase();
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderEntryTitle(entry, className) {
        const title = escapeHtml(getEntryValue(entry, "title"));
        const url = getEntryValue(entry, "url");

        if (!url) {
          return `<h3 class="${className}">${title}</h3>`;
        }

        return `
          <h3 class="${className}">
            <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${title}</a>
          </h3>
        `;
      }

      function sanitizeYoutubeVideoId(value) {
        const videoId = value == null ? "" : String(value).trim();
        return /^[A-Za-z0-9_-]{11}$/.test(videoId) ? videoId : "";
      }

      function getYoutubeVideoIdFromString(rawUrl) {
        const watchMatch = rawUrl.match(/^https?:\/\/(?:www\.|m\.)?youtube\.com\/watch\?(?:[^#]*&)?v=([^&#]+)/);

        if (watchMatch) {
          return sanitizeYoutubeVideoId(watchMatch[1]);
        }

        const shortsMatch = rawUrl.match(/^https?:\/\/(?:www\.)?youtube\.com\/shorts\/([^/?#]+)/);

        if (shortsMatch) {
          return sanitizeYoutubeVideoId(shortsMatch[1]);
        }

        const shortUrlMatch = rawUrl.match(/^https?:\/\/youtu\.be\/([^/?#]+)/);
        return shortUrlMatch ? sanitizeYoutubeVideoId(shortUrlMatch[1]) : "";
      }

      function getYoutubeVideoId(url) {
        const rawUrl = String(url || "").trim();

        if (!rawUrl) {
          return "";
        }

        try {
          const parsedUrl = new URL(rawUrl);
          const hostname = parsedUrl.hostname.replace(/^www\./, "");

          if (hostname === "youtube.com" || hostname === "m.youtube.com") {
            if (parsedUrl.pathname === "/watch") {
              return sanitizeYoutubeVideoId(parsedUrl.searchParams.get("v"));
            }

            const shortsMatch = parsedUrl.pathname.match(/^\/shorts\/([^/?#]+)/);
            return shortsMatch ? sanitizeYoutubeVideoId(shortsMatch[1]) : "";
          }

          if (hostname === "youtu.be") {
            const [videoId] = parsedUrl.pathname.split("/").filter(Boolean);
            return sanitizeYoutubeVideoId(videoId);
          }
        } catch {
          return getYoutubeVideoIdFromString(rawUrl);
        }

        return "";
      }

      function getYoutubeEmbedUrl(entry) {
        const videoId = getYoutubeVideoId(getEntryValue(entry, "url"));
        return videoId ? `https://www.youtube.com/embed/${videoId}` : "";
      }

      function getYoutubeOEmbedUrl(url) {
        const endpoint = new URL("https://www.youtube.com/oembed");
        endpoint.searchParams.set("url", url);
        endpoint.searchParams.set("format", "json");
        return endpoint.toString();
      }

      function getLoadedOEmbedMetadata(entry) {
        const url = getEntryValue(entry, "url");
        const cached = oEmbedMetadataCache.get(url);
        return cached?.status === "loaded" ? cached.metadata : null;
      }

      function canLoadOEmbedMetadata(entry) {
        const url = getEntryValue(entry, "url");
        return Boolean(url && getYoutubeVideoId(url) && typeof fetch === "function");
      }

      function loadOEmbedMetadata(entry) {
        const url = getEntryValue(entry, "url");

        if (!canLoadOEmbedMetadata(entry) || oEmbedMetadataCache.has(url) || oEmbedPendingUrls.has(url)) {
          return;
        }

        oEmbedPendingUrls.add(url);

        fetch(getYoutubeOEmbedUrl(url))
          .then((response) => {
            if (!response.ok) {
              throw new Error(`YouTube oEmbed failed with ${response.status}`);
            }
            return response.json();
          })
          .then(
            (metadata) => {
              oEmbedMetadataCache.set(url, {
                status: "loaded",
                metadata: metadata && typeof metadata === "object" ? metadata : {},
              });
              oEmbedPendingUrls.delete(url);
              renderCurrentHistoryEntries();
            },
            () => {
              oEmbedMetadataCache.set(url, { status: "failed" });
              oEmbedPendingUrls.delete(url);
              renderCurrentHistoryEntries();
            },
          )
          .finally(() => {
            oEmbedPendingUrls.delete(url);
          });
      }

      function renderTodayEntry(entry) {
        if (!entry) {
          elements.today.innerHTML = '<div class="empty-state">今天還沒有運動影片</div>';
          return;
        }

        const embedUrl = getYoutubeEmbedUrl(entry);

        if (embedUrl) {
          elements.today.innerHTML = `
            <article class="today-card">
              <div class="today-media">
                <iframe
                  class="today-video"
                  src="${escapeHtml(embedUrl)}"
                  title="${escapeHtml(getEntryValue(entry, "title"))}"
                  loading="lazy"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  referrerpolicy="strict-origin-when-cross-origin"
                  allowfullscreen
                ></iframe>
              </div>
              <div class="today-copy">
                ${renderEntryTitle(entry, "today-title")}
                <p class="today-description">${escapeHtml(getEntryValue(entry, "description"))}</p>
                <span class="today-date">${escapeHtml(getEntryValue(entry, "date"))}</span>
              </div>
            </article>
          `;
          return;
        }

        elements.today.innerHTML = `
          <article class="today-card today-card--fallback">
            <span class="equalizer-icon" aria-hidden="true">▮▮▮</span>
            <div>
              ${renderEntryTitle(entry, "today-title")}
              <p class="today-description">${escapeHtml(getEntryValue(entry, "description"))}</p>
            </div>
            <span class="today-date">${escapeHtml(getEntryValue(entry, "date"))}</span>
          </article>
        `;
      }

      function renderHistoryMedia(entry) {
        const url = getEntryValue(entry, "url");
        const metadata = getLoadedOEmbedMetadata(entry);
        const thumbnailUrl = getEntryValue(metadata, "thumbnail_url");
        const title = getEntryValue(entry, "title");

        if (thumbnailUrl) {
          return `
            <a class="record-media" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">
              <img class="record-thumbnail" src="${escapeHtml(thumbnailUrl)}" alt="${escapeHtml(title)}" loading="lazy">
            </a>
          `;
        }

        const label = getYoutubeVideoId(url) ? "載入縮圖" : "影片";

        if (url) {
          return `
            <a class="record-media record-media-placeholder" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">
              <span>${escapeHtml(label)}</span>
            </a>
          `;
        }

        return `
          <div class="record-media record-media-placeholder" aria-hidden="true">
            <span>${escapeHtml(label)}</span>
          </div>
        `;
      }

      function renderHistoryAuthor(entry) {
        const metadata = getLoadedOEmbedMetadata(entry);
        const authorName = getEntryValue(metadata, "author_name");

        return authorName ? `<p class="record-author">${escapeHtml(authorName)}</p>` : "";
      }

      function renderHistoryEntries(items, query) {
        const filtered = sortEntries(items).filter((entry) => getSearchText(entry).includes(query));

        elements.historyCount.textContent = items.length;

        if (items.length === 0) {
          elements.historyList.innerHTML = '<div class="empty-state">目前沒有歷史影片</div>';
          return;
        }

        if (filtered.length === 0) {
          elements.historyList.innerHTML = '<div class="empty-state">沒有符合條件的歷史影片</div>';
          return;
        }

        elements.historyList.innerHTML = filtered
          .map((entry) => `
            <article class="record">
              ${renderHistoryMedia(entry)}
              <div class="record-main">
                ${renderEntryTitle(entry, "record-title")}
                ${renderHistoryAuthor(entry)}
                <p class="record-description">${escapeHtml(getEntryValue(entry, "description"))}</p>
              </div>
              <span class="record-date">${escapeHtml(getEntryValue(entry, "date"))}</span>
            </article>
          `)
          .join("");

        filtered.forEach(loadOEmbedMetadata);
      }

      function renderCurrentHistoryEntries() {
        const query = elements.search.value.trim().toLowerCase();
        const todayEntryIndex = findTodayEntryIndex(entries);
        const historyEntries = entries.filter((entry, index) => index !== todayEntryIndex);

        renderHistoryEntries(historyEntries, query);
      }

      function render() {
        const query = elements.search.value.trim().toLowerCase();
        const sortedEntries = sortEntries(entries);
        const todayEntryIndex = findTodayEntryIndex(entries);
        const todayEntry = todayEntryIndex >= 0 ? entries[todayEntryIndex] : null;
        const historyEntries = entries.filter((entry, index) => index !== todayEntryIndex);

        elements.totalCount.textContent = entries.length;
        elements.latestDate.textContent = sortedEntries.length ? getEntryValue(sortedEntries[0], "date") : "-";

        renderTodayEntry(todayEntry);
        renderHistoryEntries(historyEntries, query);
      }

      elements.search.addEventListener("input", render);
      elements.themeToggle.addEventListener("click", toggleTheme);
      updateThemeToggle();
      render();
    </script>
  </body>
</html>
