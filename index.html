<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>STL 每日運動影片紀錄</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f4;
        --surface: #ffffff;
        --surface-muted: #edf2ec;
        --text: #1f2522;
        --muted: #626d68;
        --line: #d8ded8;
        --primary: #176b5b;
        --primary-strong: #0d4c40;
        --shadow: 0 16px 36px rgba(39, 50, 45, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        line-height: 1.5;
      }

      input {
        font: inherit;
      }

      a {
        color: inherit;
      }

      .app-shell {
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 22px;
      }

      .title-block h1 {
        margin: 0;
        font-size: 2rem;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .title-block p {
        margin: 8px 0 0;
        color: var(--muted);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(120px, 1fr));
        gap: 10px;
        min-width: 260px;
      }

      .stat {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px 14px;
        box-shadow: 0 8px 18px rgba(39, 50, 45, 0.06);
      }

      .stat strong {
        display: block;
        font-size: 1.45rem;
        line-height: 1.1;
      }

      .stat span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        padding: 18px;
      }

      .today-section {
        margin-bottom: 18px;
      }

      .section-heading {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .count-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 24px;
        min-height: 22px;
        border-radius: 999px;
        background: #eceef4;
        color: var(--muted);
        padding: 0 8px;
        font-size: 0.76rem;
        line-height: 1;
      }

      .today-card {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: center;
        border-left: 5px solid #665cff;
        border-radius: 8px;
        background: #201d3e;
        color: #f7f6ff;
        padding: 18px 20px;
        box-shadow: 0 18px 34px rgba(34, 31, 63, 0.18);
      }

      .today-title {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.35;
        letter-spacing: 0;
      }

      .today-title a {
        color: inherit;
        text-decoration: none;
      }

      .today-title a:hover {
        color: #b8b3ff;
      }

      .today-description {
        margin: 6px 0 0;
        color: #b8b3ff;
        white-space: pre-wrap;
      }

      .today-date {
        color: #cbc8db;
        font-size: 0.92rem;
        white-space: nowrap;
      }

      .history-panel {
        margin-top: 0;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .toolbar h2 {
        margin: 0;
        font-size: 1.05rem;
        letter-spacing: 0;
      }

      .search-wrap {
        flex: 1;
        max-width: 420px;
        min-width: 210px;
      }

      .search-wrap input {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fbfcfb;
        color: var(--text);
        padding: 0 12px;
        outline: 0;
        transition: border-color 140ms ease, box-shadow 140ms ease, background 140ms ease;
      }

      .search-wrap input:focus {
        background: #ffffff;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(23, 107, 91, 0.14);
      }

      .record-list {
        display: grid;
        gap: 12px;
      }

      .record {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        background: #ffffff;
      }

      .record-date {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        border-radius: 6px;
        background: var(--surface-muted);
        color: var(--primary-strong);
        padding: 0 9px;
        font-size: 0.86rem;
        font-weight: 750;
      }

      .record-title {
        margin: 10px 0 7px;
        font-size: 1.08rem;
        line-height: 1.35;
        letter-spacing: 0;
      }

      .record-title a {
        text-decoration-color: rgba(23, 107, 91, 0.35);
        text-underline-offset: 3px;
      }

      .record-title a:hover {
        color: var(--primary);
      }

      .record-description {
        margin: 0;
        color: #39413d;
        white-space: pre-wrap;
      }

      .empty-state {
        border: 1px dashed #c7d1c8;
        border-radius: 8px;
        background: #fbfcfb;
        color: var(--muted);
        padding: 26px 18px;
        text-align: center;
      }

      @media (max-width: 720px) {
        .topbar,
        .toolbar {
          flex-direction: column;
          align-items: stretch;
        }

        .stats {
          width: 100%;
          min-width: 0;
        }

        .search-wrap {
          max-width: none;
        }

        .today-card {
          grid-template-columns: 1fr;
        }

        .today-date {
          justify-self: start;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="title-block">
          <h1>STL 每日運動影片紀錄</h1>
          <p>記錄每天的運動影片網址與 description。</p>
        </div>
        <div class="stats" aria-label="紀錄統計">
          <div class="stat">
            <strong id="total-count">0</strong>
            <span>總紀錄</span>
          </div>
          <div class="stat">
            <strong id="latest-date">-</strong>
            <span>最新日期</span>
          </div>
        </div>
      </header>

      <section class="today-section" aria-labelledby="today-heading">
        <h2 class="section-heading" id="today-heading">今日運動</h2>
        <div id="today-entry"></div>
      </section>

      <section class="panel history-panel" aria-labelledby="history-heading">
        <div class="toolbar">
          <h2 id="history-heading">歷史影片
            <span class="count-badge" id="history-count">0</span>
          </h2>
          <div class="search-wrap">
            <input id="search-input" type="search" placeholder="搜尋歷史影片的日期、標題或 description">
          </div>
        </div>
        <div class="record-list" id="history-list"></div>
      </section>
    </main>

    <script src="data.js"></script>
    <script>
      const entries = Array.isArray(window.dailySportEntries) ? window.dailySportEntries : [];

      const elements = {
        today: document.querySelector("#today-entry"),
        historyList: document.querySelector("#history-list"),
        historyCount: document.querySelector("#history-count"),
        search: document.querySelector("#search-input"),
        totalCount: document.querySelector("#total-count"),
        latestDate: document.querySelector("#latest-date")
      };

      function getEntryValue(entry, key) {
        return entry?.[key] == null ? "" : String(entry[key]);
      }

      function sortEntries(items) {
        return [...items].sort((a, b) => {
          const dateCompare = getEntryValue(b, "date").localeCompare(getEntryValue(a, "date"));
          if (dateCompare !== 0) return dateCompare;
          return getEntryValue(a, "title").localeCompare(getEntryValue(b, "title"), "zh-Hant");
        });
      }

      function getTodayString(now = new Date()) {
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const day = String(now.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function findTodayEntryIndex(items, today = getTodayString()) {
        let latestIndex = -1;

        items.forEach((entry, index) => {
          if (getEntryValue(entry, "date") === today) {
            latestIndex = index;
          }
        });

        return latestIndex;
      }

      function getSearchText(entry) {
        return [
          getEntryValue(entry, "date"),
          getEntryValue(entry, "title"),
          getEntryValue(entry, "url"),
          getEntryValue(entry, "description")
        ].join(" ").toLowerCase();
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderTodayEntry(entry) {
        if (!entry) {
          elements.today.innerHTML = '<div class="empty-state">今天還沒有運動影片</div>';
          return;
        }

        elements.today.innerHTML = `
          <article class="today-card">
            <div>
              <h3 class="today-title">
                <a href="${escapeHtml(getEntryValue(entry, "url"))}" target="_blank" rel="noopener noreferrer">${escapeHtml(getEntryValue(entry, "title"))}</a>
              </h3>
              <p class="today-description">${escapeHtml(getEntryValue(entry, "description"))}</p>
            </div>
            <span class="today-date">${escapeHtml(getEntryValue(entry, "date"))}</span>
          </article>
        `;
      }

      function renderHistoryEntries(items, query) {
        const filtered = sortEntries(items).filter((entry) => getSearchText(entry).includes(query));

        elements.historyCount.textContent = items.length;

        if (items.length === 0) {
          elements.historyList.innerHTML = '<div class="empty-state">目前沒有歷史影片</div>';
          return;
        }

        if (filtered.length === 0) {
          elements.historyList.innerHTML = '<div class="empty-state">沒有符合條件的歷史影片</div>';
          return;
        }

        elements.historyList.innerHTML = filtered
          .map((entry) => `
            <article class="record">
              <span class="record-date">${escapeHtml(getEntryValue(entry, "date"))}</span>
              <h3 class="record-title">
                <a href="${escapeHtml(getEntryValue(entry, "url"))}" target="_blank" rel="noopener noreferrer">${escapeHtml(getEntryValue(entry, "title"))}</a>
              </h3>
              <p class="record-description">${escapeHtml(getEntryValue(entry, "description"))}</p>
            </article>
          `)
          .join("");
      }

      function render() {
        const query = elements.search.value.trim().toLowerCase();
        const sortedEntries = sortEntries(entries);
        const todayEntryIndex = findTodayEntryIndex(entries);
        const todayEntry = todayEntryIndex >= 0 ? entries[todayEntryIndex] : null;
        const historyEntries = entries.filter((entry, index) => index !== todayEntryIndex);

        elements.totalCount.textContent = entries.length;
        elements.latestDate.textContent = sortedEntries.length ? getEntryValue(sortedEntries[0], "date") : "-";

        renderTodayEntry(todayEntry);
        renderHistoryEntries(historyEntries, query);
      }

      elements.search.addEventListener("input", render);
      render();
    </script>
  </body>
</html>
